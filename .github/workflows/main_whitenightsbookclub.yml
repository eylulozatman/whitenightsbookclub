name: Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Adım 1: Kodları çekme
      - name: Checkout code
        uses: actions/checkout@v2

      # Adım 2: Python ortamını ayarlama
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      # Adım 3: Bağımlılıkları yükleme
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Adım 4: Firebase anahtarını ortam değişkeni olarak ayarlama
      - name: Set up Firebase credentials
        run: echo "FIREBASE_KEY=${{ secrets.FIREBASE_KEY }}" >> $GITHUB_ENV

      # Adım 5: Azure'a dağıtım
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: whitenightsbookclub  
          slot-name: production         
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
